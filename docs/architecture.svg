<svg width="1200" height="640" viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#070a14"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b93a7"/>
    </marker>
    <marker id="arrowc" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00d4ff"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#abg)"/>
  <text x="40" y="50" fill="#e8ecf4" font-size="22" font-weight="700">System Architecture</text>
  <text x="40" y="72" fill="#8b93a7" font-size="13">3-node Raft cluster · single epoll event loop per node · ~6,900 lines of C</text>

  <!-- Node template -->
  <!-- Node 1 (leader) -->
  <g>
    <rect x="60" y="110" width="300" height="280" rx="14" fill="#00ff88" fill-opacity="0.04" stroke="#00ff88" stroke-opacity="0.45"/>
    <text x="80" y="142" fill="#e8ecf4" font-size="16" font-weight="700">Node 1</text>
    <rect x="280" y="126" width="60" height="22" rx="11" fill="#00ff88" fill-opacity="0.18"/>
    <text x="310" y="141" fill="#00ff88" font-size="11" font-weight="700" text-anchor="middle">LEADER</text>

    <rect x="80" y="160" width="260" height="40" rx="8" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="92" y="185" fill="#00d4ff" font-size="13" font-weight="600">Raft core</text>
    <text x="328" y="185" fill="#8b93a7" font-size="10" text-anchor="end">election · replication</text>

    <rect x="80" y="208" width="260" height="40" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="92" y="233" fill="#e8ecf4" font-size="13" font-weight="600">Write-ahead log</text>
    <text x="328" y="233" fill="#8b93a7" font-size="10" text-anchor="end">CRC32 · group fsync</text>

    <rect x="80" y="256" width="260" height="40" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="92" y="281" fill="#e8ecf4" font-size="13" font-weight="600">KV store</text>
    <text x="328" y="281" fill="#8b93a7" font-size="10" text-anchor="end">hash table + rwlock</text>

    <rect x="80" y="304" width="260" height="40" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="92" y="329" fill="#e8ecf4" font-size="13" font-weight="600">epoll event loop</text>
    <text x="328" y="329" fill="#8b93a7" font-size="10" text-anchor="end">:6001 :7001 :8001</text>

    <text x="80" y="372" fill="#8b93a7" font-size="11" font-family="'JetBrains Mono', monospace">snapshot.db · wal.log · raft_meta</text>
  </g>

  <!-- Node 2 -->
  <g>
    <rect x="450" y="110" width="300" height="280" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="470" y="142" fill="#e8ecf4" font-size="16" font-weight="700">Node 2</text>
    <rect x="664" y="126" width="66" height="22" rx="11" fill="#00d4ff" fill-opacity="0.16"/>
    <text x="697" y="141" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle">FOLLOWER</text>
    <rect x="470" y="160" width="260" height="184" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="600" y="245" fill="#8b93a7" font-size="12" text-anchor="middle">Raft · WAL · KV store</text>
    <text x="600" y="266" fill="#8b93a7" font-size="12" text-anchor="middle">epoll loop · :6002 :7002 :8002</text>
    <text x="470" y="372" fill="#8b93a7" font-size="11" font-family="'JetBrains Mono', monospace">replicates log from leader</text>
  </g>

  <!-- Node 3 -->
  <g>
    <rect x="840" y="110" width="300" height="280" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="860" y="142" fill="#e8ecf4" font-size="16" font-weight="700">Node 3</text>
    <rect x="1054" y="126" width="66" height="22" rx="11" fill="#00d4ff" fill-opacity="0.16"/>
    <text x="1087" y="141" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle">FOLLOWER</text>
    <rect x="860" y="160" width="260" height="184" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="990" y="245" fill="#8b93a7" font-size="12" text-anchor="middle">Raft · WAL · KV store</text>
    <text x="990" y="266" fill="#8b93a7" font-size="12" text-anchor="middle">epoll loop · :6003 :7003 :8003</text>
    <text x="860" y="372" fill="#8b93a7" font-size="11" font-family="'JetBrains Mono', monospace">replicates log from leader</text>
  </g>

  <!-- Raft RPC arrows between nodes -->
  <line x1="360" y1="180" x2="450" y2="180" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowc)"/>
  <line x1="450" y1="210" x2="360" y2="210" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowc)"/>
  <line x1="750" y1="180" x2="840" y2="180" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowc)"/>
  <line x1="840" y1="210" x2="750" y2="210" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowc)"/>
  <text x="600" y="100" fill="#00d4ff" font-size="11" text-anchor="middle">AppendEntries · RequestVote · InstallSnapshot (TCP)</text>

  <!-- Clients -->
  <g>
    <rect x="60" y="470" width="340" height="120" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="80" y="502" fill="#e8ecf4" font-size="15" font-weight="700">kvstore-cli</text>
    <text x="80" y="528" fill="#8b93a7" font-size="12">SET · GET · DEL · STATUS · BENCH</text>
    <text x="80" y="550" fill="#8b93a7" font-size="12">leader auto-redirect · pipelined writes</text>
    <text x="80" y="576" fill="#8b93a7" font-size="11" font-family="'JetBrains Mono', monospace">binary protocol → :6001-6003</text>
  </g>
  <g>
    <rect x="800" y="470" width="340" height="120" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="820" y="502" fill="#e8ecf4" font-size="15" font-weight="700">React dashboard</text>
    <text x="820" y="528" fill="#8b93a7" font-size="12">live node cards · throughput · hash ring</text>
    <text x="820" y="550" fill="#8b93a7" font-size="12">Raft event log · :3000</text>
    <text x="820" y="576" fill="#8b93a7" font-size="11" font-family="'JetBrains Mono', monospace">WebSocket (RFC 6455) ← :8001-8003</text>
  </g>

  <!-- Client arrows -->
  <line x1="210" y1="470" x2="210" y2="392" stroke="#8b93a7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="222" y="440" fill="#8b93a7" font-size="11">client requests</text>
  <line x1="970" y1="470" x2="990" y2="392" stroke="#8b93a7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1000" y="440" fill="#8b93a7" font-size="11">JSON metrics / 1s</text>
</svg>
