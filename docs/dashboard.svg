<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#070a14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="-10%" r="80%">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="5%" r="60%">
      <stop offset="0" stop-color="#00ff88" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#glow1)"/>
  <rect width="1200" height="760" fill="url(#glow2)"/>

  <!-- Header -->
  <text x="40" y="48" fill="#e8ecf4" font-size="24" font-weight="700">
    <tspan fill="#00d4ff">◆</tspan> KVStore Cluster
  </text>
  <text x="40" y="70" fill="#8b93a7" font-size="13">Distributed key-value store · Raft consensus · 3 nodes</text>
  <text x="1160" y="52" fill="#8b93a7" font-size="13" text-anchor="end" font-family="'JetBrains Mono', monospace">leader: node 1 · term 4</text>

  <!-- Stats bar -->
  <g>
    <!-- tiles: x positions -->
    <g>
      <rect x="40"  y="92" width="216" height="86" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="148" y="142" fill="#00ff88" font-size="34" font-weight="800" text-anchor="middle">3</text>
      <text x="148" y="164" fill="#8b93a7" font-size="12" text-anchor="middle">Nodes up</text>
    </g>
    <g>
      <rect x="268" y="92" width="216" height="86" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="376" y="142" fill="#00d4ff" font-size="34" font-weight="800" text-anchor="middle">50,003</text>
      <text x="376" y="164" fill="#8b93a7" font-size="12" text-anchor="middle">Total keys</text>
    </g>
    <g>
      <rect x="496" y="92" width="216" height="86" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="604" y="142" fill="#00d4ff" font-size="34" font-weight="800" text-anchor="middle">10,214</text>
      <text x="604" y="164" fill="#8b93a7" font-size="12" text-anchor="middle">Writes / sec</text>
    </g>
    <g>
      <rect x="724" y="92" width="216" height="86" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="832" y="142" fill="#00ff88" font-size="34" font-weight="800" text-anchor="middle">18,920</text>
      <text x="832" y="164" fill="#8b93a7" font-size="12" text-anchor="middle">Reads / sec</text>
    </g>
    <g>
      <rect x="952" y="92" width="208" height="86" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="1056" y="142" fill="#ffaa00" font-size="34" font-weight="800" text-anchor="middle">98</text>
      <text x="1056" y="164" fill="#8b93a7" font-size="12" text-anchor="middle">Avg latency (µs)</text>
    </g>
  </g>

  <!-- Node cards -->
  <g>
    <!-- Node 1 (leader) -->
    <rect x="40" y="196" width="362" height="150" rx="12" fill="#00ff88" fill-opacity="0.05" stroke="#00ff88" stroke-opacity="0.5"/>
    <text x="60" y="226" fill="#e8ecf4" font-size="16" font-weight="700">Node 1</text>
    <rect x="320" y="210" width="62" height="22" rx="11" fill="#00ff88" fill-opacity="0.18"/>
    <text x="351" y="225" fill="#00ff88" font-size="11" font-weight="700" text-anchor="middle">LEADER</text>
    <g font-family="'JetBrains Mono', monospace">
      <text x="60"  y="266" fill="#8b93a7" font-size="11">Term</text>        <text x="60"  y="286" fill="#e8ecf4" font-size="16" font-weight="700">4</text>
      <text x="172" y="266" fill="#8b93a7" font-size="11">Commit index</text> <text x="172" y="286" fill="#e8ecf4" font-size="16" font-weight="700">50,003</text>
      <text x="300" y="266" fill="#8b93a7" font-size="11">Keys</text>        <text x="300" y="286" fill="#e8ecf4" font-size="16" font-weight="700">50,003</text>
      <text x="60"  y="316" fill="#8b93a7" font-size="11">WAL size</text>    <text x="60"  y="336" fill="#e8ecf4" font-size="16" font-weight="700">812.4 KB</text>
      <text x="172" y="316" fill="#8b93a7" font-size="11">Writes/s</text>    <text x="172" y="336" fill="#e8ecf4" font-size="16" font-weight="700">10,214</text>
      <text x="300" y="316" fill="#8b93a7" font-size="11">Uptime</text>      <text x="300" y="336" fill="#e8ecf4" font-size="16" font-weight="700">142s</text>
    </g>

    <!-- Node 2 (follower) -->
    <rect x="419" y="196" width="362" height="150" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="439" y="226" fill="#e8ecf4" font-size="16" font-weight="700">Node 2</text>
    <rect x="695" y="210" width="66" height="22" rx="11" fill="#00d4ff" fill-opacity="0.16"/>
    <text x="728" y="225" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle">FOLLOWER</text>
    <g font-family="'JetBrains Mono', monospace">
      <text x="439" y="266" fill="#8b93a7" font-size="11">Term</text>        <text x="439" y="286" fill="#e8ecf4" font-size="16" font-weight="700">4</text>
      <text x="551" y="266" fill="#8b93a7" font-size="11">Commit index</text> <text x="551" y="286" fill="#e8ecf4" font-size="16" font-weight="700">50,003</text>
      <text x="679" y="266" fill="#8b93a7" font-size="11">Keys</text>        <text x="679" y="286" fill="#e8ecf4" font-size="16" font-weight="700">50,003</text>
      <text x="439" y="316" fill="#8b93a7" font-size="11">WAL size</text>    <text x="439" y="336" fill="#e8ecf4" font-size="16" font-weight="700">812.4 KB</text>
      <text x="551" y="316" fill="#8b93a7" font-size="11">Writes/s</text>    <text x="551" y="336" fill="#e8ecf4" font-size="16" font-weight="700">10,210</text>
      <text x="679" y="316" fill="#8b93a7" font-size="11">Uptime</text>      <text x="679" y="336" fill="#e8ecf4" font-size="16" font-weight="700">142s</text>
    </g>

    <!-- Node 3 (follower) -->
    <rect x="798" y="196" width="362" height="150" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="818" y="226" fill="#e8ecf4" font-size="16" font-weight="700">Node 3</text>
    <rect x="1074" y="210" width="66" height="22" rx="11" fill="#00d4ff" fill-opacity="0.16"/>
    <text x="1107" y="225" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle">FOLLOWER</text>
    <g font-family="'JetBrains Mono', monospace">
      <text x="818"  y="266" fill="#8b93a7" font-size="11">Term</text>        <text x="818"  y="286" fill="#e8ecf4" font-size="16" font-weight="700">4</text>
      <text x="930"  y="266" fill="#8b93a7" font-size="11">Commit index</text> <text x="930"  y="286" fill="#e8ecf4" font-size="16" font-weight="700">49,998</text>
      <text x="1058" y="266" fill="#8b93a7" font-size="11">Keys</text>        <text x="1058" y="286" fill="#e8ecf4" font-size="16" font-weight="700">49,998</text>
      <text x="818"  y="316" fill="#8b93a7" font-size="11">WAL size</text>    <text x="818"  y="336" fill="#e8ecf4" font-size="16" font-weight="700">812.3 KB</text>
      <text x="930"  y="316" fill="#8b93a7" font-size="11">Writes/s</text>    <text x="930"  y="336" fill="#e8ecf4" font-size="16" font-weight="700">10,208</text>
      <text x="1058" y="316" fill="#8b93a7" font-size="11">Uptime</text>      <text x="1058" y="336" fill="#e8ecf4" font-size="16" font-weight="700">142s</text>
    </g>
  </g>

  <!-- Throughput chart -->
  <rect x="40" y="364" width="700" height="200" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="60" y="390" fill="#e8ecf4" font-size="13" font-weight="600">Throughput (ops/sec)</text>
  <text x="720" y="390" fill="#00d4ff" font-size="12" text-anchor="end" font-family="'JetBrains Mono', monospace">10.2k</text>
  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.05">
    <line x1="60" y1="430" x2="720" y2="430"/>
    <line x1="60" y1="470" x2="720" y2="470"/>
    <line x1="60" y1="510" x2="720" y2="510"/>
  </g>
  <!-- area + line -->
  <path d="M60 540 L100 520 L140 500 L180 470 L220 480 L260 445 L300 455 L340 430 L380 440 L420 420 L460 432 L500 415 L540 425 L580 412 L620 420 L660 410 L700 416 L720 414 L720 540 Z"
        fill="#00d4ff" fill-opacity="0.12"/>
  <path d="M60 540 L100 520 L140 500 L180 470 L220 480 L260 445 L300 455 L340 430 L380 440 L420 420 L460 432 L500 415 L540 425 L580 412 L620 420 L660 410 L700 416 L720 414"
        fill="none" stroke="#00d4ff" stroke-width="2"/>

  <!-- Hash ring -->
  <rect x="756" y="364" width="404" height="200" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="776" y="390" fill="#e8ecf4" font-size="13" font-weight="600">Consistent hash ring · 150 vnodes/node</text>
  <circle cx="958" cy="470" r="62" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="14"/>
  <!-- ring arcs colored per node -->
  <circle cx="958" cy="470" r="62" fill="none" stroke="#00ff88" stroke-width="14" stroke-dasharray="130 259" stroke-dashoffset="0" transform="rotate(-90 958 470)"/>
  <circle cx="958" cy="470" r="62" fill="none" stroke="#00d4ff" stroke-width="14" stroke-dasharray="130 259" stroke-dashoffset="-130" transform="rotate(-90 958 470)"/>
  <circle cx="958" cy="470" r="62" fill="none" stroke="#ffaa00" stroke-width="14" stroke-dasharray="129 260" stroke-dashoffset="-260" transform="rotate(-90 958 470)"/>
  <text x="958" y="466" fill="#e8ecf4" font-size="12" text-anchor="middle">3 nodes</text>
  <text x="958" y="482" fill="#8b93a7" font-size="10" text-anchor="middle">450 vnodes</text>
  <g font-size="11" font-family="'JetBrains Mono', monospace">
    <circle cx="1058" cy="442" r="5" fill="#00ff88"/> <text x="1070" y="446" fill="#8b93a7">node 1 · 33.4%</text>
    <circle cx="1058" cy="468" r="5" fill="#00d4ff"/> <text x="1070" y="472" fill="#8b93a7">node 2 · 33.3%</text>
    <circle cx="1058" cy="494" r="5" fill="#ffaa00"/> <text x="1070" y="498" fill="#8b93a7">node 3 · 33.3%</text>
  </g>

  <!-- Event log -->
  <rect x="40" y="582" width="1120" height="150" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="60" y="608" fill="#e8ecf4" font-size="13" font-weight="600">Raft event log</text>
  <g font-family="'JetBrains Mono', monospace" font-size="12">
    <text x="60" y="634" fill="#8b93a7">14:02:41.118</text> <text x="170" y="634" fill="#00ff88">node 1 became LEADER for term 4 (3/3 votes)</text>
    <text x="60" y="656" fill="#8b93a7">14:02:41.090</text> <text x="170" y="656" fill="#ffaa00">node 1 starting election, term 4</text>
    <text x="60" y="678" fill="#8b93a7">14:02:40.984</text> <text x="170" y="678" fill="#ff4444">node 2 connection lost — leader heartbeat timeout</text>
    <text x="60" y="700" fill="#8b93a7">14:02:38.512</text> <text x="170" y="700" fill="#00d4ff">snapshot written @ index 50000 (WAL compacted 812 KB → 41 KB)</text>
    <text x="60" y="722" fill="#8b93a7">14:02:35.221</text> <text x="170" y="722" fill="#8b93a7">AppendEntries batch committed: 64 entries, 1 fsync</text>
  </g>
</svg>
